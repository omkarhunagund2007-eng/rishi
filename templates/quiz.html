<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Examination Terminal - GovPrep Portal</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            background-color: var(--bg-main) !important;
        }

        .main-content {
            margin: 0 auto !important;
            margin-left: 0 !important;
            max-width: 1200px;
            padding: 1.5rem !important;
        }

        .exam-page-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .exam-header-bar {
            align-items: center;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            padding: 1rem 2rem;
        }

        .exam-body-scrollable {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
        }
    </style>
</head>
<body class="exam-page-layout" data-duration="{{ duration_seconds | int }}">
    <header class="exam-header-bar">
        <div>
            <span class="subject-badge badge-primary" style="margin-bottom: 0.25rem;">SECURE EXAM TERMINAL</span>
            <h2 style="font-size: 1.25rem; font-weight: 700;">{{ quiz_subject }} Mock Examination</h2>
        </div>

        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <div style="text-align: right;">
                <p style="font-size: 0.75rem; color: var(--text-muted);">Remaining Time</p>
                <div class="timer-box" id="examTimerBadge">
                    <span id="timerText">00:00</span>
                </div>
            </div>
            <button id="endExamTopBtn" class="btn btn-primary" type="button" style="padding: 0.5rem 1.25rem; background-color: var(--danger); font-size: 0.88rem;">
                Submit Test
            </button>
        </div>
    </header>

    <div class="timer-bar-container">
        <div class="timer-progress-bar" id="examTimerBar"></div>
    </div>

    <main class="exam-body-scrollable main-content">
        <div class="quiz-workspace">
            <div class="question-panel">
                <div class="glass-card" style="min-height: 380px; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <div class="question-number-header">
                            <span id="questionIndexLabel">Question 1 of 1</span>
                            <span id="difficultyLabel" class="diff-badge diff-Medium">Medium</span>
                        </div>

                        <div style="margin-top: 1.5rem; margin-bottom: 2rem;">
                            <p class="question-text" id="questionTextContent">Loading exam questions...</p>
                        </div>

                        <div class="options-container" id="optionsContainer"></div>
                    </div>

                    <div class="quiz-action-bar" style="border-top: 1px solid var(--border-color); padding-top: 1.25rem; margin-top: 2rem;">
                        <button id="flagBtn" class="btn btn-secondary" type="button">Mark for Review</button>

                        <div style="display: flex; gap: 0.5rem;">
                            <button id="prevBtn" class="btn btn-secondary" type="button">Previous</button>
                            <button id="nextBtn" class="btn btn-primary" type="button">Save & Next</button>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="glass-card palette-card">
                <div>
                    <h3 style="font-size: 1rem; margin-bottom: 0.25rem;">Question Palette</h3>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem;">Jump directly to any question below:</p>

                    <div class="palette-grid" id="paletteGrid"></div>
                </div>

                <div class="palette-legend">
                    <div class="legend-item">
                        <div class="legend-color answered"></div>
                        <span style="color: var(--text-muted);">Answered</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color flagged"></div>
                        <span style="color: var(--text-muted);">Flagged for Review</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color unvisited"></div>
                        <span style="color: var(--text-muted);">Not Attempted</span>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <form action="/quiz/submit" method="POST" id="hiddenSubmitForm" style="display: none;">
        <input type="hidden" name="time_taken" id="formTimeTaken">
        <input type="hidden" name="answers_json" id="formAnswersJson">
    </form>

    <script id="questionsData" type="application/json">{{ questions | tojson }}</script>
    <script>
        const questions = JSON.parse(document.getElementById('questionsData').textContent || '[]');
        const totalDuration = Number(document.body.dataset.duration) || 0;

        let timeRemaining = totalDuration;
        let activeIndex = 0;
        let submitted = false;

        const answers = {};
        const flagged = {};

        const timerText = document.getElementById('timerText');
        const examTimerBadge = document.getElementById('examTimerBadge');
        const examTimerBar = document.getElementById('examTimerBar');
        const questionIndexLabel = document.getElementById('questionIndexLabel');
        const difficultyLabel = document.getElementById('difficultyLabel');
        const questionTextContent = document.getElementById('questionTextContent');
        const optionsContainer = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const flagBtn = document.getElementById('flagBtn');
        const paletteGrid = document.getElementById('paletteGrid');
        const endExamTopBtn = document.getElementById('endExamTopBtn');
        const hiddenSubmitForm = document.getElementById('hiddenSubmitForm');
        const formTimeTaken = document.getElementById('formTimeTaken');
        const formAnswersJson = document.getElementById('formAnswersJson');

        questions.forEach((question) => {
            answers[question.id] = null;
            flagged[question.id] = false;
        });

        function formatTime(seconds) {
            const safeSeconds = Math.max(0, seconds);
            const mins = Math.floor(safeSeconds / 60);
            const secs = safeSeconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function renderTimer() {
            timerText.textContent = formatTime(timeRemaining);
            examTimerBar.style.width = totalDuration > 0 ? `${(timeRemaining / totalDuration) * 100}%` : '0%';

            if (timeRemaining <= 30) {
                examTimerBadge.className = 'timer-box danger';
                examTimerBar.style.backgroundColor = 'var(--danger)';
            } else if (timeRemaining <= totalDuration * 0.25) {
                examTimerBadge.className = 'timer-box warning';
                examTimerBar.style.backgroundColor = 'var(--warning)';
            }
        }

        function renderPalette() {
            paletteGrid.innerHTML = '';

            questions.forEach((question, index) => {
                const btn = document.createElement('button');
                btn.className = 'palette-btn';
                btn.type = 'button';
                btn.textContent = index + 1;

                if (activeIndex === index) {
                    btn.classList.add('active');
                }

                if (flagged[question.id]) {
                    btn.classList.add('flagged');
                } else if (answers[question.id] !== null) {
                    btn.classList.add('answered');
                }

                btn.addEventListener('click', () => {
                    activeIndex = index;
                    loadQuestion(index);
                });

                paletteGrid.appendChild(btn);
            });
        }

        function createOptionRow(question, option) {
            const row = document.createElement('div');
            row.className = 'option-row';

            if (answers[question.id] === option.key) {
                row.classList.add('selected');
            }

            const letter = document.createElement('span');
            letter.className = 'option-letter';
            letter.textContent = option.key;

            const text = document.createElement('span');
            text.className = 'option-text';
            text.textContent = option.text;

            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `question_${question.id}`;
            radio.value = option.key;
            radio.className = 'option-radio';
            radio.checked = answers[question.id] === option.key;

            row.append(letter, text, radio);

            row.addEventListener('click', () => {
                optionsContainer.querySelectorAll('.option-row').forEach((optionRow) => {
                    optionRow.classList.remove('selected');
                });

                row.classList.add('selected');
                radio.checked = true;
                answers[question.id] = option.key;
                renderPalette();
            });

            return row;
        }

        function loadQuestion(index) {
            const question = questions[index];

            if (!question) {
                questionIndexLabel.textContent = 'No questions available';
                questionTextContent.textContent = 'No questions were loaded for this exam.';
                optionsContainer.innerHTML = '';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                flagBtn.disabled = true;
                renderPalette();
                return;
            }

            questionIndexLabel.textContent = `Question ${index + 1} of ${questions.length}`;
            difficultyLabel.textContent = question.difficulty || 'Medium';
            difficultyLabel.className = `diff-badge diff-${question.difficulty || 'Medium'}`;
            questionTextContent.textContent = question.text || '';
            optionsContainer.innerHTML = '';

            [
                { key: 'A', text: question.option_a },
                { key: 'B', text: question.option_b },
                { key: 'C', text: question.option_c },
                { key: 'D', text: question.option_d }
            ].forEach((option) => {
                optionsContainer.appendChild(createOptionRow(question, option));
            });

            prevBtn.disabled = index === 0;
            nextBtn.textContent = index === questions.length - 1 ? 'Finish Test' : 'Save & Next';
            nextBtn.style.backgroundColor = index === questions.length - 1 ? 'var(--success)' : 'var(--primary)';

            flagBtn.textContent = flagged[question.id] ? 'Remove Flag' : 'Mark for Review';
            flagBtn.style.backgroundColor = flagged[question.id] ? 'var(--warning-bg)' : 'transparent';
            flagBtn.style.color = flagged[question.id] ? 'var(--warning)' : 'var(--text-main)';

            renderPalette();
        }

        function triggerSubmission(isTimeout = false) {
            if (submitted) {
                return;
            }

            if (!isTimeout && !confirm('Are you sure you want to submit your test?')) {
                return;
            }

            if (isTimeout) {
                alert('Time limit reached. Your mock examination will be submitted automatically.');
            }

            submitted = true;
            clearInterval(timerInterval);
            formTimeTaken.value = Math.max(0, totalDuration - timeRemaining);
            formAnswersJson.value = JSON.stringify(answers);
            hiddenSubmitForm.submit();
        }

        prevBtn.addEventListener('click', () => {
            if (activeIndex > 0) {
                activeIndex -= 1;
                loadQuestion(activeIndex);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (activeIndex < questions.length - 1) {
                activeIndex += 1;
                loadQuestion(activeIndex);
            } else {
                triggerSubmission(false);
            }
        });

        flagBtn.addEventListener('click', () => {
            const question = questions[activeIndex];
            if (!question) {
                return;
            }

            flagged[question.id] = !flagged[question.id];
            loadQuestion(activeIndex);
        });

        endExamTopBtn.addEventListener('click', () => triggerSubmission(false));

        const timerInterval = setInterval(() => {
            timeRemaining -= 1;
            renderTimer();

            if (timeRemaining <= 0) {
                triggerSubmission(true);
            }
        }, 1000);

        renderTimer();
        loadQuestion(0);
    </script>
</body>
</html>
